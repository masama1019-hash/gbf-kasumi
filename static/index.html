<!DOCTYPE html>
<html lang="ja">
<head>
<meta charset="utf-8">
<meta name="viewport" content="width=device-width, initial-scale=1">
<title>古戦場（霞桜団）</title>
<script src="https://cdnjs.cloudflare.com/ajax/libs/Chart.js/4.4.1/chart.umd.js"></script>
<style>
  :root { --blue:#378ADD; --red:#D85A30; --green:#1D9E75; --bg:#f6f7f9; --card:#fff; --tx:#1c2733; --mut:#68707a; }
  * { box-sizing:border-box; margin:0; }
  body { font-family:-apple-system,"Hiragino Sans",sans-serif; background:var(--bg); color:var(--tx); }
  header { background:#1c2733; color:#fff; padding:14px 18px; display:flex; align-items:center; gap:14px; flex-wrap:wrap; }
  header h1 { font-size:17px; font-weight:600; }
  .tabs { display:flex; gap:4px; margin-left:auto; }
  .tab { padding:7px 16px; border-radius:8px; background:transparent; color:#cfd6dd; border:none; font-size:14px; cursor:pointer; }
  .tab.on { background:var(--blue); color:#fff; }
  main { max-width:860px; margin:0 auto; padding:16px; }
  .card { background:var(--card); border-radius:12px; padding:16px; margin-bottom:14px; box-shadow:0 1px 3px rgba(0,0,0,.06); }
  .row { display:flex; gap:10px; flex-wrap:wrap; align-items:center; }
  .metrics { display:grid; grid-template-columns:repeat(auto-fit,minmax(130px,1fr)); gap:10px; margin-bottom:14px; }
  .metric { background:var(--card); border-radius:10px; padding:12px; box-shadow:0 1px 3px rgba(0,0,0,.06); }
  .metric .l { font-size:12px; color:var(--mut); }
  .metric .v { font-size:22px; font-weight:600; margin-top:2px; }
  .metric .s { font-size:11px; color:var(--mut); }
  select,input,button { font-size:14px; padding:8px 10px; border:1px solid #d5dae0; border-radius:8px; background:#fff; }
  button.primary { background:var(--blue); color:#fff; border:none; cursor:pointer; }
  .chartbox { position:relative; height:240px; }
  h2 { font-size:14px; color:var(--mut); font-weight:600; margin-bottom:8px; }
  table { width:100%; border-collapse:collapse; font-size:13px; }
  th,td { padding:6px 8px; text-align:right; border-bottom:1px solid #eef0f2; }
  th:first-child,td:first-child { text-align:left; }
  .good { color:var(--green); font-weight:600; } .bad { color:var(--red); font-weight:600; }
  .load { color:var(--mut); font-size:13px; padding:20px; text-align:center; }
  .hide { display:none; }
  .badge { display:inline-block; padding:3px 10px; border-radius:20px; font-size:12px; font-weight:600; }
</style>
</head>
<body>
<header>
  <h1>⚔️ 古戦場（霞桜団）</h1>
  <select id="raidSel" style="font-size:13px;padding:5px 8px;border-radius:8px;border:none;background:#2e3d4d;color:#fff"></select>
  <div class="tabs">
    <button class="tab on" data-tab="live">ライブ</button>
    <button class="tab" data-tab="scout">サーチ</button>
    <button class="tab" data-tab="koran">個ラン</button>
  </div>
</header>
<main>

<div id="pane-live">
  <div class="card">
    <div class="row">
      <label style="font-size:13px;color:var(--mut)">対象日</label>
      <select id="dateSel"></select>
      <label id="oppLabel" style="font-size:13px;color:var(--mut)">相手</label>
      <input id="oppInput" placeholder="相手団名 または 団ID" style="flex:1;min-width:140px">
      <label id="pastLabel" style="font-size:13px;color:var(--mut)">過去比較</label>
      <select id="pastSel">
        <option value="0">なし</option>
        <option value="1" selected>前日</option>
        <option value="9">全本戦日</option>
      </select>
      <button class="primary" onclick="loadLive()">更新</button>
      <label style="font-size:12px;color:var(--mut)"><input type="checkbox" id="autoRef"> 5分毎自動更新</label>
    </div>
  </div>
  <div id="liveBody"><div class="load">「更新」を押すと集計します（初回は30秒ほどかかります）</div></div>
</div>

<div id="pane-scout" class="hide">
  <div class="card">
    <div class="row">
      <input id="scoutQ" placeholder="相手の団名 または 団ID" style="flex:1;min-width:200px">
      <button class="primary" onclick="loadScout()">分析</button>
    </div>
    <div style="font-size:11px;color:var(--mut);margin-top:6px">団名は完全一致優先(上位3000位内)。見つからない場合はゲーム内URLの団IDで指定</div>
  </div>
  <div id="scoutBody"></div>
</div>

<div id="pane-koran" class="hide">
  <div class="card">
    <div class="row">
      <input id="koranQ" placeholder="プレイヤー名 または ユーザーID" style="flex:1;min-width:180px">
      <label style="font-size:13px;color:var(--mut)">表示</label>
      <select id="koranDay"></select>
      <label style="font-size:13px;color:var(--mut)">比較</label>
      <select id="koranTgt">
        <option value="both">両方</option>
        <option value="2000">英雄(2000位)</option>
        <option value="100k">10万位</option>
      </select>
      <button class="primary" onclick="loadKoran()">検索</button>
    </div>
    <div style="font-size:11px;color:var(--mut);margin-top:6px">個人貢献度を 英雄ライン(2000位)・10万位ライン と比較。「表示」で概要(日別)か対象日の時刻毎(1H)を選択。名前が複数該当時は一覧から選択。開催回はヘッダーのセレクタで切替。</div>
  </div>
  <div id="koranBody"><div class="load">プレイヤー名かユーザーIDを入れて「検索」</div></div>
</div>

</main>
<script>
const $=s=>document.querySelector(s);
// 数値を小数点1桁で表示(nullは—)。予選・本戦・スカウト全テーブル/カードで統一
const f1=x=>(x!=null&&x!=='')?(+x).toFixed(1):'—';
let charts={}, cfg=null, timer=null;
document.querySelectorAll('.tab').forEach(b=>b.onclick=()=>{
  document.querySelectorAll('.tab').forEach(x=>x.classList.remove('on'));
  b.classList.add('on');
  $('#pane-live').classList.toggle('hide', b.dataset.tab!=='live');
  $('#pane-scout').classList.toggle('hide', b.dataset.tab!=='scout');
  $('#pane-koran').classList.toggle('hide', b.dataset.tab!=='koran');
});
function mkChart(id,type,labels,datasets,extra={}){
  if(charts[id]) charts[id].destroy();
  charts[id]=new Chart($(id),{type,data:{labels,datasets},options:{
    responsive:true,maintainAspectRatio:false,interaction:{mode:'index',intersect:false},
    plugins:{legend:{display:true,labels:{boxWidth:14,font:{size:11}}}},
    scales:{x:{grid:{display:false},ticks:{font:{size:10}}},y:{ticks:{font:{size:10}}}},...extra}});
}
function fillDates(){
  const battle=(cfg.schedules||[]).filter(s=>s.day_of>=4);
  const sel=$('#dateSel'); sel.innerHTML='';
  const yo=document.createElement('option'); yo.value='yosen'; yo.textContent='予選'; sel.appendChild(yo);
  battle.forEach(s=>{const o=document.createElement('option');o.value=s.day;o.textContent=`本戦${s.day_of-3}日目 (${s.day})`;sel.appendChild(o);});
  sel.selectedIndex=battle.length;  // 既定は最新本戦日
  sel.onchange=syncYosenUI; syncYosenUI();
}
function syncYosenUI(){
  const yo=$('#dateSel').value==='yosen';
  // 予選は相手団不要・過去比較は前回予選のみ → グレーアウト
  ['#oppInput','#pastSel'].forEach(s=>{const e=$(s); e.disabled=yo; e.style.opacity=yo?0.4:1;});
  $('#oppLabel').style.opacity=yo?0.4:1; $('#pastLabel').style.opacity=yo?0.4:1;
}
async function fetchJSON(url,tries=4){
  for(let i=0;i<tries;i++){
    try{ const r=await fetch(url); if(r.ok) return await r.json(); }catch(e){}
    await new Promise(res=>setTimeout(res, 1500));
  }
  throw new Error('fetch failed: '+url);
}
async function init(raid){
  try{
    cfg=await fetchJSON('/api/config'+(raid?'?raid='+raid:''));
  }catch(e){
    setTimeout(()=>init(raid), 3000); return;
  }
  const rs=$('#raidSel');
  if(!rs.options.length){
    (cfg.raids||[cfg.raid]).forEach(r=>{const o=document.createElement('option');o.value=r;o.textContent=`第${r}回`;rs.appendChild(o);});
    rs.value=cfg.raid;
    rs.onchange=()=>{init(rs.value); $('#liveBody').innerHTML='<div class="load">「更新」を押すと集計します</div>'; $('#scoutBody').innerHTML=''; $('#koranBody').innerHTML='<div class="load">プレイヤー名かユーザーIDを入れて「検索」</div>';};
  }
  fillDates();
  fillKoranDays();
}
const KORAN_LBL={1:'予選1',2:'予選2',3:'中間',4:'本戦1',5:'本戦2',6:'本戦3',7:'本戦4'};
function fillKoranDays(){
  const sel=$('#koranDay'); if(!sel) return; sel.innerHTML='';
  const o0=document.createElement('option'); o0.value=''; o0.textContent='概要(日別)'; sel.appendChild(o0);
  (cfg.schedules||[]).slice().sort((a,b)=>a.day_of-b.day_of).forEach(s=>{
    const o=document.createElement('option'); o.value=s.day; o.textContent=`${KORAN_LBL[s.day_of]||s.day_of} (1H)`; sel.appendChild(o);});
}
function paceJudge(ratio){
  if(ratio==null) return null;
  const pct=Math.round(ratio*100);
  if(pct>=115) return {pct,txt:'前日より加速中',bg:'#fcebeb',fg:'#A32D2D'};
  if(pct>=85)  return {pct,txt:'前日並みペース',bg:'#faeeda',fg:'#854F0B'};
  if(pct>=60)  return {pct,txt:'前日より減速',bg:'#e6f1fb',fg:'#185FA5'};
  return {pct,txt:'撤退の可能性大',bg:'#e1f5ee',fg:'#0F6E56'};
}
async function loadYosen(){
  $('#liveBody').innerHTML='<div class="load">予選データ取得中…(初回は15〜30秒)</div>';
  let d;
  try{ d=await (await fetch('/api/yosen?raid='+$('#raidSel').value)).json(); }
  catch(e){ $('#liveBody').innerHTML='<div class="card bad">取得に時間がかかり切断されました。もう一度「更新」を押してください</div>'; return; }
  if(d.error){$('#liveBody').innerHTML=`<div class="card bad">${d.error}</div>`;return;}
  if(!d.keys||!d.keys.length){$('#liveBody').innerHTML='<div class="card" style="color:var(--mut)">この回の予選毎時データはgbfdataに未収録です（古い開催回では予選の時間毎データが残っていません）。本戦の日別実績は本戦日を選ぶと表示できます。</div>';return;}
  const K=d.keys, L=d.labels;
  const oc=K.map(k=>d.ours.cum[k]??null), bc=K.map(k=>d.border.cum[k]??null);
  const os=K.map(k=>d.ours.speed[k]??null), bs=K.map(k=>d.border.speed[k]??null);
  const orank=K.map(k=>d.ours.rank[k]??null);
  const li=oc.map((v,i)=>v!=null?i:-1).reduce((a,b)=>Math.max(a,b),-1);
  const lo=li>=0?oc[li]:null, lb=li>=0?bc[li]:null, lr=li>=0?orank[li]:null;
  const diff=(lo!=null&&lb!=null)?lo-lb:null;
  const p=d.prev;
  // 前回を開始時刻(20時)そろえでインデックス整列(今回と前回どちらも同じ予選タイムライン構造)
  const pcum=(side)=>{ if(!p)return[]; const pv=Object.values(p[side].cum);
    return K.map((_,i)=>i<pv.length?pv[i]:null); };
  const pb=pcum('border');
  // 300位ボーダー 今回 vs 前回(同時刻)
  const lpb=(li>=0&&li<pb.length)?pb[li]:null;
  const bdiff=(lb!=null&&lpb!=null)?lb-lpb:null;
  const bpct=(lb!=null&&lpb)?Math.round(lb/lpb*100):null;
  // 前回同時刻比の文言(上昇/減少の度合い)
  const trendTxt=(pct)=>{ if(pct==null)return''; if(pct>=110)return'（今回大きく上昇）'; if(pct>=103)return'（今回やや上昇）'; if(pct>=98)return'（前回とほぼ同水準）'; if(pct>=90)return'（今回やや減少）'; return'（今回大きく減少）'; };
  // 300位ボーダー着地予想: 現時点の300位 × (前回最終300位 ÷ 前回同時刻300位)
  const pbAll=p?Object.values(p.border.cum):[];
  const prevFinal=pbAll.length?pbAll[pbAll.length-1]:null;
  const projFinal=(lb!=null&&lpb&&prevFinal)?lb*(prevFinal/lpb):null;
  const ourMargin=(lo!=null&&projFinal!=null)?lo-projFinal:null;  // 現時点自団 − 着地予想
  $('#liveBody').innerHTML=`
    <div class="metrics">
      <div class="metric"><div class="l">霞桜団 予選貢献度</div><div class="v">${lo?.toFixed(1)??'—'}<span style="font-size:12px">億</span></div><div class="s">${lr?lr+'位':''}</div></div>
      <div class="metric"><div class="l">300位ボーダー</div><div class="v">${lb?.toFixed(1)??'—'}<span style="font-size:12px">億</span></div><div class="s">予選通過ライン</div></div>
      <div class="metric"><div class="l">300位との差</div><div class="v ${diff>=0?'good':'bad'}">${diff!=null?(diff>0?'+':'')+diff.toFixed(1):'—'}<span style="font-size:12px">億</span></div><div class="s">${diff!=null?(diff>=0?'通過圏内':'圏外・要追い上げ'):''}</div></div>
      ${p?`<div class="metric"><div class="l">300位 前回同時刻比</div><div class="v ${bdiff>0?'bad':'good'}" style="font-size:20px">${bpct!=null?bpct+'%':'—'}</div><div class="s">前回${lpb?.toFixed(1)??'—'}億 / ${bdiff!=null?(bdiff>0?'+':'')+bdiff.toFixed(1)+'億':''}${trendTxt(bpct)}</div></div>`:''}
      ${projFinal!=null?`<div class="metric"><div class="l">300位ボーダー着地予想</div><div class="v">${f1(projFinal)}<span style="font-size:12px">億</span></div><div class="s">前回最終${f1(prevFinal)}億基準${bpct!=null?` / 前回着地比較（同時刻${bpct}%）`:''}</div></div>`:''}
    </div>
    <div class="card"><h2>累積貢献度（億）— 実線=今回 / 点線=前回(第${d.raid-1}回)</h2><div class="chartbox"><canvas id="yCum"></canvas></div></div>
    <div class="card"><h2>時速（億/h）</h2><div class="chartbox"><canvas id="ySpd"></canvas></div></div>
    <div class="card"><h2>予選推移（数値・億）</h2><div style="overflow-x:auto"><table><tr><th>時刻</th><th>霞桜団</th><th>順位</th><th>時速</th><th>300位</th><th>時速</th><th>差</th>${p?'<th>前回300位</th><th>前回比</th>':''}</tr>${
      K.map((k,i)=>{const df=(oc[i]!=null&&bc[i]!=null)?oc[i]-bc[i]:null; const bd=(bc[i]!=null&&pb[i]!=null)?bc[i]-pb[i]:null;
        return `<tr><td>${L[i]}</td><td>${f1(oc[i])}</td><td style="color:var(--mut)">${orank[i]?orank[i]+'位':'—'}</td><td style="color:var(--mut)">${f1(os[i])}</td><td>${f1(bc[i])}</td><td style="color:var(--mut)">${f1(bs[i])}</td><td class="${df!=null?(df>=0?'good':'bad'):''}">${df!=null?(df>0?'+':'')+df.toFixed(1):'—'}</td>${p?`<td style="color:var(--mut)">${f1(pb[i])}</td><td class="${bd!=null?(bd>0?'bad':'good'):''}">${bd!=null?(bd>0?'+':'')+bd.toFixed(1):'—'}</td>`:''}</tr>`;}).join('')
    }</table></div></div>`;
  mkChart('#yCum','line',L,[
    {label:'霞桜団',data:oc,borderColor:'#378ADD',backgroundColor:'#378ADD',tension:.2,pointRadius:0,borderWidth:2.5,spanGaps:true},
    {label:'300位',data:bc,borderColor:'#D85A30',backgroundColor:'#D85A30',tension:.2,pointRadius:0,borderWidth:2.5,spanGaps:true},
    ...(p?[{label:'前回霞桜団',data:pcum('ours'),borderColor:'#85B7EB',backgroundColor:'#85B7EB',borderDash:[5,3],tension:.2,pointRadius:0,borderWidth:1.5,spanGaps:true},
         {label:'前回300位',data:pcum('border'),borderColor:'#F0997B',backgroundColor:'#F0997B',borderDash:[5,3],tension:.2,pointRadius:0,borderWidth:1.5,spanGaps:true}]:[]),
    ...(projFinal!=null?[{label:'300位着地予想',data:L.map(()=>projFinal),borderColor:'#993C1D',borderDash:[2,3],tension:0,pointRadius:0,borderWidth:1.5}]:[])]);
  mkChart('#ySpd','line',L,[
    {label:'霞桜団時速',data:os,borderColor:'#378ADD',backgroundColor:'#378ADD',tension:.3,pointRadius:0,borderWidth:2,spanGaps:true},
    {label:'300位時速',data:bs,borderColor:'#D85A30',backgroundColor:'#D85A30',tension:.3,pointRadius:0,borderWidth:2,spanGaps:true}]);
}
function pickOpp(gid){ $('#oppInput').value=gid; loadLive(); }
async function loadLive(){
  if($('#dateSel').value==='yosen'){ return loadYosen(); }
  const past=$('#pastSel').value;
  $('#liveBody').innerHTML='<div class="load">データ取得中…(初回や過去比較ありは1〜2分かかることがあります)</div>';
  const p=new URLSearchParams({date:$('#dateSel').value,past,raid:$('#raidSel').value});
  if($('#oppInput').value.trim()) p.set('opp',$('#oppInput').value.trim());
  let d;
  try{ d=await (await fetch('/api/live?'+p)).json(); }
  catch(e){ $('#liveBody').innerHTML='<div class="card bad">取得に時間がかかり切断されました。もう一度「更新」を押してください（続きはキャッシュされているため、リトライごとに速くなります）</div>'; return; }
  if(d.error){$('#liveBody').innerHTML=`<div class="card bad">${d.error}</div>`;return;}
  if(d.candidates){
    const rows=d.candidates.map(c=>`<tr><td style="text-align:left">${c.name}</td><td>${c.prev!=null?c.prev+'億':'—'}</td><td>${c.rank?c.rank+'位':'—'}</td><td><button onclick="pickOpp('${c.gid}')">この団を選択</button></td></tr>`).join('');
    $('#liveBody').innerHTML=`<div class="card"><h2>同名団が${d.candidates.length}団あります — ${d.prev_label}貢献度・総合順位で相手を選択してください</h2>
      <table><tr><th style="text-align:left">団名</th><th>${d.prev_label}貢献度</th><th>総合順位</th><th></th></tr>${rows}</table>
      <div style="font-size:12px;color:var(--mut);margin-top:8px">※対戦相手は前日(予選)貢献度が自団と近いはずです。ゲームのマッチング画面の数値と照合してください。</div></div>`;
    return;
  }
  const H=d.hours.map(h=>h==='24:00'?'24':String(parseInt(h)));
  const arr=(s,k)=>d.hours.map(h=>s[k][h]??null);
  const oc=arr(d.ours,'cum'), pc=arr(d.opp,'cum'), os=arr(d.ours,'speed'), ps=arr(d.opp,'speed');
  const lastIdx=oc.map((v,i)=>v!=null?i:-1).reduce((a,b)=>Math.max(a,b),-1);
  const lo=lastIdx>=0?oc[lastIdx]:0, lp=lastIdx>=0&&pc[lastIdx]!=null?pc[lastIdx]:null;
  const lead=lp!=null?(lo-lp):null;
  // 前日同時刻比(撤退判断): 直近時刻の値 ÷ 前日(=past配列の最後)の同時刻値
  const prev=(d.past||[]).length?d.past[d.past.length-1]:null;
  let judgeCards='';
  if(prev&&lastIdx>=0){
    const hkey=d.hours[lastIdx];
    const oj=paceJudge(prev.opp.cum[hkey]?(d.opp.cum[hkey]??null)/prev.opp.cum[hkey]:null);
    const kj=paceJudge(prev.ours.cum[hkey]?(d.ours.cum[hkey]??null)/prev.ours.cum[hkey]:null);
    if(oj) judgeCards+=`<div class="metric"><div class="l">相手 ${prev.label}同時刻比</div><div class="v" style="font-size:18px">${oj.pct}%</div><div class="s"><span class="badge" style="background:${oj.bg};color:${oj.fg}">${oj.txt}</span></div></div>`;
    if(kj) judgeCards+=`<div class="metric"><div class="l">自団 ${prev.label}同時刻比</div><div class="v" style="font-size:18px">${kj.pct}%</div><div class="s">${kj.txt}</div></div>`;
  }
  // 相手方針 & 勝率予想
  const fc=d.forecast;
  if(fc){
    if(fc.policy){
      const tone={bad:['#fcebeb','#A32D2D'],mid:['#faeeda','#854F0B'],good:['#e1f5ee','#0F6E56']}[fc.policy.tone];
      judgeCards+=`<div class="metric"><div class="l">相手の方針(直近時速)</div><div class="v" style="font-size:17px"><span class="badge" style="background:${tone[0]};color:${tone[1]}">${fc.policy.label}</span></div><div class="s">前日同時間帯の時速比 ${fc.policy.pct}%</div></div>`;
    }
    const wc=fc.win>=60?'good':(fc.win>=40?'':'bad');
    judgeCards+=`<div class="metric"><div class="l">本日勝率予想</div><div class="v ${wc}">${fc.win}%</div><div class="s">予測最終 ${fc.proj_ours}億 vs ${fc.proj_opp}億<br>過去戦績${fc.prior}%×${fc.basis}</div></div>`;
  }
  // 前日同時刻のリード(日次対戦なので前日の同時点と比較できると撤退判断に便利)
  let prevLeadTxt='';
  if(prev&&lastIdx>=0){
    const hkey=d.hours[lastIdx];
    const po=prev.ours.cum[hkey], pp=prev.opp.cum[hkey];

    {label:d.ours.name,data:oc,borderColor:'#378ADD',backgroundColor:'#378ADD',tension:.25,pointRadius:0,borderWidth:2.5,spanGaps:true},

    mkChart('#rankC','line',rh.map(r=>r.raid+'回'),[

  ]);
